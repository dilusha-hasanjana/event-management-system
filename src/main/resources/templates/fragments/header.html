<div th:fragment="header" class="top-bar">
    <div class="top-bar-left">
        <h2 th:text="${pageTitle != null ? pageTitle : 'Dashboard'}">Dashboard</h2>
    </div>
    <div class="top-bar-right" th:if="${#authentication.principal != null}">
        <div class="profile-mini">
            <div class="avatar" th:text="${#strings.substring(#authentication.principal.fullName, 0, 1)}">U</div>
            <div class="profile-info">
                <div style="font-weight: 600; font-size: 0.875rem;" th:text="${#authentication.principal.fullName}">Full Name</div>
                <div class="badge badge-primary" style="font-size: 0.65rem;" th:text="${#authentication.principal.role}">ROLE</div>
            </div>
        </div>
    </div>
</div>
