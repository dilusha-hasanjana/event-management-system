<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<header th:fragment="header" class="main-header">
    <div class="header-content">
        <div class="logo">
            <h1>📚 Faculty Events</h1>
        </div>
        <div class="user-info" th:if="${#authentication.principal != null}">
            <span>Welcome, <strong th:text="${#authentication.principal.fullName}">User</strong></span>
            <span class="role-badge" th:text="${#authentication.principal.role}">ROLE</span>
        </div>
    </div>
</header>
</body>
</html>
