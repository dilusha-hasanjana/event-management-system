<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join Faculty Event Management</p>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                <ul>
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>

            <div class="form-group">
                <label for="fullName">Full Name <span class="required">*</span></label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control" th:errorclass="field-error" required>
                <div th:if="${#fields.hasErrors('fullName')}" class="error-message" th:errors="*{fullName}"></div>
            </div>

            <div class="form-group">
                <label for="username">Username <span class="required">*</span></label>
                <input type="text" id="username" th:field="*{username}" class="form-control" th:errorclass="field-error" required>
                <div th:if="${usernameError}" class="error-message" th:text="${usernameError}"></div>
                <div th:if="${#fields.hasErrors('username')}" class="error-message" th:errors="*{username}"></div>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" th:field="*{email}" class="form-control" th:errorclass="field-error" required>
                <div th:if="${emailError}" class="error-message" th:text="${emailError}"></div>
                <div th:if="${#fields.hasErrors('email')}" class="error-message" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" th:field="*{password}" class="form-control" th:errorclass="field-error" required>
                <div th:if="${#fields.hasErrors('password')}" class="error-message" th:errors="*{password}"></div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </div>

            <div class="auth-links">
                <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
            </div>
        </form>
    </div>
</div>
<!-- Handle interactive alerts -->
<script th:src="@{/js/alerts.js}"></script>
</body>
</html>
