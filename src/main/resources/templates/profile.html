<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Account Settings')}"></div>

        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;" class="animate-up">
            <!-- Profile Sidebar -->
            <aside>
                <div class="card" style="text-align: center; padding: 3rem 2rem;">
                    <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--primary-soft); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; margin: 0 auto 1.5rem; border: 4px solid white; box-shadow: var(--shadow);">
                        <span th:text="${rawUser.fullName != null && !rawUser.fullName.isEmpty() ? #strings.substring(rawUser.fullName, 0, 1) : 'U'}">U</span>
                    </div>
                    <h2 th:text="${rawUser.fullName}" style="margin-bottom: 0.5rem;">Full Name</h2>
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem;" th:text="'@' + ${rawUser.username}">username</p>
                    
                    <div style="display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem;">
                        <span th:class="'badge badge-' + ${rawUser.role.name().toLowerCase()}" th:text="${rawUser.role}">Role</span>
                        <span class="badge badge-success">Active</span>
                    </div>

                    <div style="text-align: left; background: var(--background); padding: 1.5rem; border-radius: var(--radius-md);">
                        <div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Activity Summary</div>
                            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                                <div th:if="${rawUser.role.name() == 'USER'}">
                                    <span style="font-weight: 700; color: var(--primary);" th:text="${totalRegistered}">0</span>
                                    <span style="font-size: 0.8rem; color: var(--text-muted);">Events</span>
                                </div>
                                <div th:if="${rawUser.role.name() == 'ORGANIZER'}">
                                    <span style="font-weight: 700; color: var(--primary);" th:text="${totalApproved}">0</span>
                                    <span style="font-size: 0.8rem; color: var(--text-muted);">Hosted</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Profile Form -->
            <section>
                <div class="card">
                    <h3 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Update Personal Information</h3>
                    
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/profile/update}" th:object="${user}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label class="label">Username (Permanent)</label>
                                <input type="text" th:field="*{username}" class="input" readonly style="opacity: 0.6; cursor: not-allowed;">
                            </div>

                            <div class="form-group">
                                <label class="label">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="input" required>
                                <div th:if="${#fields.hasErrors('fullName')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{fullName}"></div>
                            </div>

                            <div class="form-group" style="grid-column: span 2;">
                                <label class="label">Email Address</label>
                                <input type="email" th:field="*{email}" class="input" required>
                                <div th:if="${#fields.hasErrors('email')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{email}"></div>
                            </div>

                            <div style="grid-column: span 2; margin: 1.5rem 0; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                                <h4 style="margin-bottom: 1rem;">Security Settings</h4>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                    <div class="form-group">
                                        <label class="label">New Password</label>
                                        <input type="password" th:field="*{password}" class="input" placeholder="Leave blank to keep current">
                                        <div th:if="${#fields.hasErrors('password')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{password}"></div>
                                    </div>
                                    <div class="form-group">
                                        <label class="label">Confirm New Password</label>
                                        <input type="password" th:field="*{confirmPassword}" class="input" placeholder="Repeat new password">
                                        <div th:if="${passwordError}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:text="${passwordError}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
