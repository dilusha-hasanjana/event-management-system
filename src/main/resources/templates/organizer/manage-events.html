<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Request Events - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>
    
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='My Event Requests')}"></div>

        <div class="card animate-up" style="animation-delay: 0.1s;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 style="margin: 0;">Event Proposals</h3>
                <a th:href="@{/organizer/events/new}" class="btn btn-primary">
                    <span>➕</span> Request New Event
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Title</th>
<<<<<<< HEAD
                        <th>Date & Time</th>
=======
                        <th>Date &amp; Time</th>
>>>>>>> e33cc71ecc2db42cf20f55966e9e78751704d5a6
                        <th>Location</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${events}">
                        <td style="font-weight: 500;" th:text="${event.title}"></td>
                        <td th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy HH:mm')}"></td>
                        <td th:text="${event.location}"></td>
                        <td>
                            <span th:class="'badge badge-' + (${event.status.name() == 'APPROVED' ? 'success' : (event.status.name() == 'REJECTED' ? 'danger' : 'warning')})" th:text="${event.status}"></span>
                        </td>
                        <td th:text="${#temporals.format(event.createdAt, 'MMM dd, yyyy')}"></td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <a th:href="@{/organizer/events/view/{id}(id=${event.id})}" class="btn btn-secondary btn-sm" title="View Details">👁️</a>

                                <a th:if="${event.status.name() == 'PENDING'}"
                                   th:href="@{/organizer/events/edit/{id}(id=${event.id})}" 
                                   class="btn btn-secondary btn-sm" title="Edit">✏️</a>

                                <form th:if="${event.status.name() == 'PENDING'}"
                                      th:action="@{/organizer/events/delete/{id}(id=${event.id})}" 
                                      method="post" style="display: inline;"
                                      onsubmit="return confirm('Are you sure you want to delete this event request?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-secondary btn-sm" style="color: var(--danger); border-color: var(--danger-soft);" title="Delete">🗑️</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="6" style="text-align: center; padding: 3rem;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📋</div>
                            <p style="color: var(--text-muted); margin-bottom: 1rem;">No events found.</p>
                            <a th:href="@{/organizer/events/new}" class="btn btn-primary">Request your first event</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
