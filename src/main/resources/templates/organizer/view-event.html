<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="dashboard-header">
        <div>
            <h1 th:text="${event.title}">Event Title</h1>
            <p class="subtitle">Detailed view of your event request</p>
        </div>
        <div class="badges">
            <span th:class="'badge status-' + ${event.status.name().toLowerCase()}" th:text="${event.status}"></span>
            <span th:if="${event.premium}" class="badge badge-premium">Premium</span>
            <span th:if="${event.featured}" class="badge badge-featured">Featured</span>
        </div>
    </div>

    <div class="content-section">
        <div class="section-header">
            <h3>Event Information</h3>
            <div th:if="${event.status.name() == 'PENDING'}" class="action-buttons">
                <a th:href="@{/organizer/events/edit/{id}(id=${event.id})}" class="btn btn-warning">✏️ Edit Request</a>
                <form th:action="@{/organizer/events/delete/{id}(id=${event.id})}" method="post" style="display: inline;"
                      onsubmit="return confirm('Are you sure you want to delete this event request?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">🗑️ Delete Request</button>
                </form>
            </div>
        </div>

        <div class="details-layout">
            <div class="detail-main">
                <div class="detail-block">
                    <label>Description</label>
                    <p th:text="${event.description}" class="description-text">Description text</p>
                </div>
            </div>
            
            <div class="detail-sidebar">
                <div class="info-card">
                    <div class="info-item">
                        <span class="info-label">📍 Location</span>
                        <span class="info-value" th:text="${event.location}">Location</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">📅 Date</span>
                        <span class="info-value" th:text="${#temporals.format(event.eventDate, 'MMMM dd, yyyy')}">Date</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">⏰ Time</span>
                        <span class="info-value" th:text="${#temporals.format(event.eventDate, 'HH:mm')}">Time</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">⏱️ Created</span>
                        <span class="info-value" th:text="${#temporals.format(event.createdAt, 'MMM dd, yyyy')}">Created</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">👥 Attendees</span>
                        <span class="info-value" th:text="${event.attendees.size()}">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-actions">
            <a th:href="@{/organizer/dashboard}" class="btn btn-secondary">← Back to Dashboard</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
