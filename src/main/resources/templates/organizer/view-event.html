<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>
    
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Event Details')}"></div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;" class="animate-up">
            <!-- Main Content -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
                    <div>
                        <h2 style="margin: 0; margin-bottom: 0.5rem;" th:text="${event.title}">Event Title</h2>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <span th:class="'badge badge-' + (${event.status.name() == 'APPROVED' ? 'success' : (event.status.name() == 'REJECTED' ? 'danger' : 'warning')})" th:text="${event.status}"></span>
                            <span th:if="${event.premium}" class="badge badge-warning">Premium</span>
                            <span th:if="${event.featured}" class="badge badge-info">Featured</span>
                        </div>
                    </div>
                    <div th:if="${event.status.name() == 'PENDING'}" style="display: flex; gap: 0.5rem;">
                        <a th:href="@{/organizer/events/edit/{id}(id=${event.id})}" class="btn btn-secondary btn-sm">✏️ Edit</a>
                        <form th:action="@{/organizer/events/delete/{id}(id=${event.id})}" method="post" style="display: inline;"
                              onsubmit="return confirm('Are you sure you want to delete this event request?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-secondary btn-sm" style="color: var(--danger); border-color: var(--danger-soft);">🗑️ Delete</button>
                        </form>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <h4 style="margin-bottom: 1rem; color: var(--text-muted);">Description</h4>
                    <p style="line-height: 1.7;" th:text="${event.description}">Description text</p>
                </div>
                
                <div style="margin-top: 2rem;">
                    <a th:href="@{/organizer/manage-events}" class="btn btn-secondary">← Back to Requests</a>
                </div>
            </div>
            
            <!-- Sidebar Info -->
            <div class="card" style="align-self: start;">
                <h4 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Event Information</h4>
                
                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Location</div>
                        <div style="font-weight: 500; margin-top: 0.25rem;" th:text="${event.location}">Location</div>
                    </div>
                    <div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Date & Time</div>
                        <div style="font-weight: 500; margin-top: 0.25rem;" th:text="${#temporals.format(event.eventDate, 'MMMM dd, yyyy HH:mm')}">Date Time</div>
                    </div>
                    <div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Submitted On</div>
                        <div style="font-weight: 500; margin-top: 0.25rem;" th:text="${#temporals.format(event.createdAt, 'MMM dd, yyyy')}">Created</div>
                    </div>
                    <div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Attendees</div>
                        <div style="font-weight: 500; margin-top: 0.25rem;" th:text="${event.attendees.size()} + ' Registered'">0 Registered</div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
