<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request New Event - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="dashboard-header">
        <div>
            <h1>Request New Event</h1>
            <p class="subtitle">Submit a proposal for a new faculty event</p>
        </div>
    </div>

    <div class="content-section">
        <div class="section-header">
            <h3>Event Proposal Form</h3>
            <span class="badge status-pending">New Request</span>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger animate-fade-in" th:text="${errorMessage}"></div>

        <form th:action="@{/organizer/events/request}" th:object="${event}" method="post">
            <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                <ul>
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-grid">
                <div class="form-group">
                    <label for="title">Event Title <span class="required">*</span></label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" th:errorclass="field-error" placeholder="e.g. Science Fair 2026" required>
                    <div th:if="${#fields.hasErrors('title')}" class="error-message" th:errors="*{title}"></div>
                </div>

                <div class="form-group">
                    <label for="location">Location/Venue <span class="required">*</span></label>
                    <input type="text" id="location" th:field="*{location}" class="form-control" th:errorclass="field-error" placeholder="e.g. Conference Room A" required>
                    <div th:if="${#fields.hasErrors('location')}" class="error-message" th:errors="*{location}"></div>
                </div>

                <div class="form-group">
                    <label for="eventDate">Preferred Date &amp; Time <span class="required">*</span></label>
                    <input type="datetime-local" id="eventDate" th:field="*{eventDate}" class="form-control" th:errorclass="field-error" required>
                    <div th:if="${#fields.hasErrors('eventDate')}" class="error-message" th:errors="*{eventDate}"></div>
                </div>

                <div class="form-group full-width">
                    <label for="description">Detailed Description <span class="required">*</span></label>
                    <textarea id="description" th:field="*{description}" class="form-control" th:errorclass="field-error" rows="6" placeholder="Provide a detailed overview of the event, including its purpose and key highlights..." required></textarea>
                    <div th:if="${#fields.hasErrors('description')}" class="error-message" th:errors="*{description}"></div>
                </div>
            </div>

            <div class="footer-actions">
                <button type="submit" class="btn btn-primary">Submit Proposal</button>
                <a th:href="@{/organizer/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
