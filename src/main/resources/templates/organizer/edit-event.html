<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>
    
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Edit Event Request')}"></div>

        <div class="card animate-up" style="max-width: 800px; margin: 0 auto; width: 100%;">
            <div style="border-bottom: 1px solid var(--border); margin-bottom: 2rem; padding-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 style="margin: 0;">Modify Event Request</h2>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Modify your pending event details.</p>
                </div>
                <span class="badge badge-warning">Status: Pending Review</span>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/organizer/events/edit/{id}(id=${eventId})}" th:object="${event}" method="post">
                <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                    <ul style="margin-left: 1.5rem; margin-bottom: 0;">
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                    </ul>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="label" for="title">Event Title <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="title" th:field="*{title}" class="input" th:errorclass="field-error" required>
                    <div th:if="${#fields.hasErrors('title')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{title}"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="location">Location/Venue <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="location" th:field="*{location}" class="input" th:errorclass="field-error" required>
                    <div th:if="${#fields.hasErrors('location')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{location}"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="label" for="date">Event Date <span style="color: var(--danger);">*</span></label>
                        <input type="date" id="date" th:field="*{date}" class="input" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('date')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{date}"></div>
                    </div>

                    <div class="form-group">
                        <label class="label" for="time">Event Time <span style="color: var(--danger);">*</span></label>
                        <input type="time" id="time" th:field="*{time}" class="input" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('time')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{time}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label" for="description">Detailed Description <span style="color: var(--danger);">*</span></label>
                    <textarea id="description" th:field="*{description}" class="input" th:errorclass="field-error" rows="6" required></textarea>
                    <div th:if="${#fields.hasErrors('description')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{description}"></div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Update Request</button>
                    <a th:href="@{/organizer/dashboard}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
