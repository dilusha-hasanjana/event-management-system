<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>Manage Events</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-actions">
        <a th:href="@{/admin/events/add}" class="btn btn-primary">Add New Event</a>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Location</th>
                <th>Date</th>
                <th>Type</th>
                <th>Attendees</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="event : ${events}" th:class="${event.isPremium()} ? 'premium-row' : (${event.isFeatured()} ? 'featured-row' : '')">
                <td th:text="${event.id}"></td>
                <td th:text="${event.title}"></td>
                <td th:text="${event.location}"></td>
                <td th:text="${#temporals.format(event.eventDate, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <span th:if="${event.isPremium()}" class="badge badge-premium">Premium</span>
                    <span th:if="${event.isFeatured()}" class="badge badge-featured">Featured</span>
                    <span th:if="!${event.isPremium()} and !${event.isFeatured()}" class="badge badge-standard">Standard</span>
                </td>
                <td th:text="${#lists.size(event.attendees)}"></td>
                <td class="actions">
                    <a th:href="@{/admin/events/edit/{id}(id=${event.id})}" class="btn btn-sm btn-edit">Edit</a>
                    <form th:action="@{/admin/events/delete/{id}(id=${event.id})}" method="post" class="inline-form" onsubmit="return confirm('Are you sure you want to delete this event?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-delete">Delete</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(events)}">
                <td colspan="7" class="text-center">No events found</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
