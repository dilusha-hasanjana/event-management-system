<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="form-container">
        <h2>Edit User</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/admin/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
            <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                <ul>
                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                </ul>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <div class="form-row">
                    <div class="form-label">
                        <label for="id">User ID:</label>
                    </div>
                    <div class="form-input">
                        <input type="text" id="id" th:field="*{id}" class="form-control" readonly>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="username">Username:</label>
                    </div>
                    <div class="form-input">
                        <input type="text" id="username" th:field="*{username}" class="form-control" readonly>
                        <small style="color: #666;">Username cannot be changed</small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="fullName">Full Name: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('fullName')}" class="error-message" th:errors="*{fullName}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="email">Email: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <input type="email" id="email" th:field="*{email}" class="form-control" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('email')}" class="error-message" th:errors="*{email}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="role">Role: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <select id="role" th:field="*{role}" class="form-control" required>
                            <option th:each="roleOpt : ${roles}" 
                                    th:value="${roleOpt}" 
                                    th:text="${roleOpt}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="password">New Password:</label>
                    </div>
                    <div class="form-input">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Leave blank to keep current password">
                    </div>
                </div>

                <div class="form-row checkbox-row">
                    <div class="form-label"></div>
                    <div class="form-input checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{active}"> Active Account
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label"></div>
                    <div class="form-input">
                        <button type="submit" class="btn btn-primary">Update User</button>
                        <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
