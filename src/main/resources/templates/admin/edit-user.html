<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>
    
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Edit User')}"></div>

        <div class="card animate-up" style="max-width: 800px; margin: 0 auto; width: 100%;">
            <div style="border-bottom: 1px solid var(--border); margin-bottom: 2rem; padding-bottom: 1rem;">
                <h2 style="margin: 0;">Update User Account</h2>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
                <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                    <ul style="margin-left: 1.5rem; margin-bottom: 0;">
                        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                    </ul>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="label" for="id">User ID</label>
                    <input type="text" id="id" th:field="*{id}" class="input" readonly style="opacity: 0.7; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label class="label" for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="input" readonly style="opacity: 0.7; cursor: not-allowed;">
                    <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem;">Username cannot be changed</div>
                </div>

                <div class="form-group">
                    <label class="label" for="fullName">Full Name <span style="color: var(--danger);">*</span></label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="input" th:errorclass="field-error" required>
                    <div th:if="${#fields.hasErrors('fullName')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{fullName}"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="email">Email <span style="color: var(--danger);">*</span></label>
                    <input type="email" id="email" th:field="*{email}" class="input" th:errorclass="field-error" required>
                    <div th:if="${#fields.hasErrors('email')}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label class="label" for="role">Role <span style="color: var(--danger);">*</span></label>
                    <select id="role" th:field="*{role}" class="input" required style="background: white;">
                        <option th:each="roleOpt : ${roles}" 
                                th:value="${roleOpt}" 
                                th:text="${roleOpt}"></option>
                    </select>
                </div>

                <div class="form-group" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                    <label class="label" for="password">New Password</label>
                    <input type="password" id="password" name="password" class="input" placeholder="Leave blank to keep current password">
                </div>

                <div class="form-group" style="display: flex; gap: 2rem; margin-top: 1rem; padding: 1rem; background: var(--surface-hover); border-radius: var(--radius-md);">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" th:field="*{active}"> 
                        <span style="font-weight: 500;">Active Account</span>
                    </label>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Update User</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
