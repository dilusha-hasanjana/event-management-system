<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Requests - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Review Requests')}"></div>

        <div class="top-bar animate-up">
            <h1 style="margin: 0;">Pending Requests</h1>
        </div>

        <div th:if="${successMessage}" class="alert alert-success animate-up" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger animate-up" th:text="${errorMessage}"></div>

        <div class="table-wrapper animate-up" style="animation-delay: 0.1s;">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Event Information</th>
                    <th>Organizer</th>
                    <th>Requested Date</th>
                    <th>Location</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event : ${events}">
                    <td>
                        <div style="font-weight: 600; color: var(--text-main);" th:text="${event.title}">Title</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="'ID: #' + ${event.id}">ID</div>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div class="avatar" style="width: 32px; height: 32px; font-size: 0.8rem;" th:text="${#strings.substring(event.createdBy.fullName, 0, 1)}">O</div>
                            <div th:text="${event.createdBy.fullName}">Organizer</div>
                        </div>
                    </td>
                    <td>
                        <div th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${#temporals.format(event.eventDate, 'HH:mm')}">Time</div>
                    </td>
                    <td th:text="${event.location}">Location</td>
                    <td>
                        <div style="display: flex; gap: 0.75rem;">
                            <form th:action="@{/admin/events/approve/{id}(id=${event.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-primary btn-sm" style="background: var(--success); border: none;">
<<<<<<< HEAD
                                    <span>✅</span> Approve
=======
                                    <span></span> Approve
>>>>>>> e33cc71ecc2db42cf20f55966e9e78751704d5a6
                                </button>
                            </form>
                            
                            <form th:action="@{/admin/events/reject/{id}(id=${event.id})}" method="post" 
                                  onsubmit="return confirm('Are you sure you want to reject this request?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-secondary btn-sm" style="color: var(--danger); border-color: var(--danger-soft);">
<<<<<<< HEAD
                                    <span>❌</span> Reject
=======
                                    <span></span> Reject
>>>>>>> e33cc71ecc2db42cf20f55966e9e78751704d5a6
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(events)}">
                    <td colspan="5" style="text-align: center; padding: 4rem;">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">☕</div>
                        <div style="color: var(--text-muted); font-size: 1.1rem;">All caught up! No pending requests to review.</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
