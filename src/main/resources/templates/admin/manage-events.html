<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Event Management')}"></div>

        <div class="top-bar animate-up">
            <h1 style="margin: 0;">Events</h1>
            <a th:href="@{/admin/events/get}" class="btn btn-primary">
                <span></span> Add New Event
            </a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success animate-up" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger animate-up" th:text="${errorMessage}"></div>

        <div class="table-wrapper animate-up" style="animation-delay: 0.1s;">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Event Details</th>
                    <th>Date & Time</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Metrics</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event : ${events}">
                    <td>
                        <div style="font-weight: 600; color: var(--text-main);" th:text="${event.title}">Title</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="'ID: #' + ${event.id}">ID</div>
                    </td>
                    <td>
                        <div th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${#temporals.format(event.eventDate, 'HH:mm')}">Time</div>
                    </td>
                    <td th:text="${event.location}">Location</td>
                    <td>
                        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                            <span th:class="'badge ' + (${event.premium} ? 'badge-warning' : 'badge-primary')" 
                                  th:text="${event.premium} ? 'Premium' : 'Regular'"></span>
                            <span th:if="${event.featured}" class="badge badge-info">Featured</span>
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span></span>
                            <span th:text="${#lists.size(event.attendees)}">0</span>
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; gap: 0.5rem;">
                            <a th:href="@{/admin/events/edit/{id}(id=${event.id})}" class="btn btn-secondary btn-sm" title="Edit">
                                <span></span>
                            </a>
                            <form th:action="@{/admin/events/delete/{id}(id=${event.id})}" method="post" 
                                  onsubmit="return confirm('Are you sure you want to delete this event?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-secondary btn-sm" style="color: var(--danger); border-color: var(--danger-soft);" title="Delete">
                                    <span></span>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(events)}">
                    <td colspan="6" style="text-align: center; padding: 3rem;">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📭</div>
                        <div style="color: var(--text-muted);">No events found. Start by creating one!</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
