<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='User Management')}"></div>

        <div class="top-bar animate-up">
            <h1 style="margin: 0;">System Users</h1>
        </div>

        <div th:if="${successMessage}" class="alert alert-success animate-up" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger animate-up" th:text="${errorMessage}"></div>

        <div class="table-wrapper animate-up" style="animation-delay: 0.1s;">
            <table class="data-table">
            <thead>
            <tr>
                <th>User Information</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Events</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}" th:style="${!user.active} ? 'opacity: 0.6;' : ''">
                <td>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div class="avatar" th:text="${#strings.substring(user.fullName, 0, 1)}">U</div>
                        <div>
                            <div style="font-weight: 600; color: var(--text-main);" th:text="${user.fullName}">Full Name</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="'@' + ${user.username}">username</div>
                        </div>
                    </div>
                </td>
                <td th:text="${user.email}">Email</td>
                <td>
                    <span th:class="'badge badge-' + ${user.role.name().toLowerCase()}" th:text="${user.role}">Role</span>
                </td>
                <td>
                    <span th:class="'badge ' + (${user.active} ? 'badge-success' : 'badge-danger')" 
                          th:text="${user.active} ? 'Active' : 'Deactivated'"></span>
                </td>
                <td>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span>⭐</span>
                        <span th:text="${#lists.size(user.registeredEvents)}">0</span>
                    </div>
                </td>
                <td>
                    <div style="display: flex; gap: 0.5rem;">
                        <span th:if="${#authentication.principal.id == user.id}" class="badge badge-info">Current Account</span>
                        
                        <th:block th:if="${#authentication.principal.id != user.id}">
                            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-secondary btn-sm" title="Edit">
                                <span>✏️</span>
                            </a>
                            
                            <form th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-secondary btn-sm" 
                                        th:title="${user.active} ? 'Deactivate' : 'Activate'">
                                    <span th:text="${user.active} ? '🔒' : '🔓'"></span>
                                </button>
                            </form>
                            
                            <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" 
                                  onsubmit="return confirm('Are you sure you want to delete this user?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-secondary btn-sm" style="color: var(--danger);" title="Delete">
                                    <span>🗑️</span>
                                </button>
                            </form>
                        </th:block>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="6" style="text-align: center; padding: 3rem;">
                    <div style="color: var(--text-muted);">No users found in the system.</div>
                </td>
            </tr>
            </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
