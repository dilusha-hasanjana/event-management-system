<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>Manage Users</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-container">
        <table class="data-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Registered Events</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}" th:class="!${user.active} ? 'inactive-row' : ''">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.fullName}"></td>
            <td th:text="${user.email}"></td>
            <td>
                <span th:class="'badge badge-' + ${user.role.name().toLowerCase()}" th:text="${user.role}"></span>
            </td>
            <td>
                <span th:class="'badge badge-' + (${user.active} ? 'active' : 'inactive')" th:text="${user.active} ? 'Active' : 'Inactive'"></span>
            </td>
            <td th:text="${#lists.size(user.registeredEvents)}"></td>
            <td class="actions">
                <span th:if="${#authentication.principal.id == user.id}" class="badge badge-info">Current User</span>
                
                <th:block th:if="${#authentication.principal.id != user.id}">
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-info">Edit</a>
                    
                    <form th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post" class="inline-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" th:class="'btn btn-sm ' + (${user.active} ? 'btn-warning' : 'btn-success')" 
                                th:text="${user.active} ? 'Deactivate' : 'Activate'"></button>
                    </form>
                    
                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" class="inline-form" 
                          onsubmit="return confirm('Are you sure you want to delete this user? This action cannot be undone.')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </th:block>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="8" class="text-center">No users found</td>
        </tr>
        </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
