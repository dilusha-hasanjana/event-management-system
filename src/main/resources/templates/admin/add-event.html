<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Event - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="form-container">
        <h2>Add New Event</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>

        <form th:action="@{/api/v1/admin/events/addevent}" th:object="${event}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <div class="form-row">
                    <div class="form-label">
                        <label for="id">ID:</label>
                    </div>
                    <div class="form-input">
                        <input type="text" id="id" th:field="*{id}" class="form-control" readonly placeholder="Auto-generated">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="title">Title: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <input type="text" id="title" th:field="*{title}" class="form-control" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('title')}" class="error-message" th:errors="*{title}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="description">Description: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <textarea id="description" th:field="*{description}" class="form-control" th:errorclass="field-error" rows="4" required></textarea>
                        <div th:if="${#fields.hasErrors('description')}" class="error-message" th:errors="*{description}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="location">Location: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <input type="text" id="location" th:field="*{location}" class="form-control" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('location')}" class="error-message" th:errors="*{location}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label">
                        <label for="eventDate">Date: <span class="required">*</span></label>
                    </div>
                    <div class="form-input">
                        <input type="datetime-local" id="eventDate" th:field="*{eventDate}" class="form-control" th:errorclass="field-error" required>
                        <div th:if="${#fields.hasErrors('eventDate')}" class="error-message" th:errors="*{eventDate}"></div>
                    </div>
                </div>

                <div class="form-row checkbox-row">
                    <div class="form-label"></div>
                    <div class="form-input checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{premium}"> Premium Event
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" th:field="*{featured}"> Featured Event
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-label"></div>
                    <div class="form-input">
                        <button type="submit" class="btn btn-primary">Add Event</button>
                        <a th:href="@{/admin/events}" class="btn btn-secondary">Cancel</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/validation.js}"></script>
</body>
</html>
