<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="app-wrapper">
    <!-- Sidebar -->
    <div th:replace="~{fragments/nav :: nav}"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <div th:replace="~{fragments/header :: header(pageTitle='System Overview')}"></div>

        <!-- Identity Hero Section -->
        <div th:replace="~{fragments/identity :: identity-card}"></div>

        <!-- Stats Grid -->
        <div class="stats-grid animate-up" style="animation-delay: 0.1s;">
            <div class="card stat-card">
                <div class="stat-icon-wrapper" style="background: var(--primary-soft); color: var(--primary);">📊</div>
                <div class="stat-info">
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value" th:text="${totalEvents}">0</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon-wrapper" style="background: var(--success-soft); color: var(--success);">👥</div>
                <div class="stat-info">
                    <div class="stat-label">Total Users</div>
                    <div class="stat-value" th:text="${totalUsers}">0</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon-wrapper" style="background: var(--warning-soft); color: var(--warning);">⭐</div>
                <div class="stat-info">
                    <div class="stat-label">Admins</div>
                    <div class="stat-value" th:text="${adminCount}">0</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon-wrapper" style="background: var(--info-soft); color: var(--info);">📅</div>
                <div class="stat-info">
                    <div class="stat-label">Upcoming Events</div>
                    <div class="stat-value" th:text="${upcomingEvents}">0</div>
                </div>
            </div>
        </div>

        
        <div class="card animate-up" style="animation-delay: 0.2s;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="margin: 0;">Quick Management</h3>
                <span class="badge badge-info">Fast Access</span>
            </div>
            <div class="action-buttons">
                <a th:href="@{/admin/events}" class="btn btn-primary">
                    <span></span> Manage All Events
                </a>
                <a th:href="@{/admin/users}" class="btn btn-secondary">
                    <span></span> User Management
                </a>
                <a th:href="@{/admin/events/requests}" class="btn btn-secondary">
                    <span></span> View Requests
                </a>
            </div>
        </div>
        
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>

<script th:src="@{/js/admin.js}"></script>
</body>
</html>
