<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='My Dashboard')}"></div>

        <div th:replace="~{fragments/identity :: identity-card}"></div>

        <div class="stats-grid animate-up" style="animation-delay: 0.1s;">
            <div class="card stat-card">
                <div class="stat-icon-wrapper" style="background: var(--primary-soft); color: var(--primary);">⭐</div>
                <div class="stat-info">
                    <div class="stat-label">Registered Events</div>
                    <div class="stat-value" th:text="${registeredCount}">0</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon-wrapper" style="background: var(--info-soft); color: var(--info);">📅</div>
                <div class="stat-info">
                    <div class="stat-label">Upcoming Events</div>
                    <div class="stat-value" th:text="${#lists.size(upcomingEvents)}">0</div>
                </div>
            </div>
        </div>

        <div class="content-section animate-up" style="animation-delay: 0.2s; background: transparent; padding: 0; box-shadow: none;">
            <div class="section-header">
                <h3 style="margin: 0;">My Registered Events</h3>
                <a th:href="@{/user/events}" class="btn btn-secondary btn-sm">Browse More</a>
            </div>

            <div th:if="${#lists.isEmpty(myEvents)}" class="card" style="text-align: center; padding: 4rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🎫</div>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">You haven't registered for any events yet.</p>
                <a th:href="@{/user/events}" class="btn btn-primary">Discover Events</a>
            </div>

            <div th:unless="${#lists.isEmpty(myEvents)}" class="events-grid">
                <div th:each="event : ${myEvents}" class="card event-card animate-up">
                    <div class="event-header">
                        <h4 th:text="${event.title}" style="margin: 0; font-size: 1.1rem;"></h4>
                        <div style="display: flex; gap: 0.25rem;">
                            <span th:if="${event.isPremium()}" class="badge badge-warning" style="font-size: 0.6rem;">Premium</span>
                            <span th:if="${event.isFeatured()}" class="badge badge-info" style="font-size: 0.6rem;">Featured</span>
                        </div>
                    </div>
                    <div style="margin: 1rem 0; color: var(--text-muted); font-size: 0.875rem;">
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                            <span>📍</span> <span th:text="${event.location}">Location</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span>🕒</span> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, HH:mm')}">Date</span>
                        </div>
                    </div>
                    <form th:action="@{/user/events/unregister/{id}(id=${event.id})}" method="post" style="margin-top: 1rem;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-secondary btn-sm" style="width: 100%; color: var(--danger); border-color: var(--danger-soft);">
                            Unregister
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
