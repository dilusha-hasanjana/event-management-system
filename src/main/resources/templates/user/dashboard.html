<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>Welcome, <span th:text="${user.fullName}">User</span>!</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"></div>
            <div class="stat-value" th:text="${registeredCount}">0</div>
            <div class="stat-label">My Events</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"></div>
            <div class="stat-value" th:text="${#lists.size(upcomingEvents)}">0</div>
            <div class="stat-label">Upcoming Events</div>
        </div>
    </div>

    <div class="dashboard-sections">
        <div class="section">
            <h3>My Registered Events</h3>
            <div th:if="${#lists.isEmpty(myEvents)}" class="empty-state">
                <p>You haven't registered for any events yet.</p>
                <a th:href="@{/user/events}" class="btn btn-primary">Browse Events</a>
            </div>
            <div th:unless="${#lists.isEmpty(myEvents)}" class="event-cards">
                <div th:each="event : ${myEvents}" class="event-card">
                    <div class="event-header">
                        <h4 th:text="${event.title}"></h4>
                        <span th:if="${event.isPremium()}" class="badge badge-premium">Premium</span>
                        <span th:if="${event.isFeatured()}" class="badge badge-featured">Featured</span>
                    </div>
                    <p class="event-location"> <span th:text="${event.location}"></span></p>
                    <p class="event-date"> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy HH:mm')}"></span></p>
                    <form th:action="@{/user/events/unregister/{id}(id=${event.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-warning">Unregister</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Quick Actions</h3>
            <div class="action-buttons">
                <a th:href="@{/user/events}" class="btn btn-primary"> Browse All Events</a>
                <a th:href="@{/user/my-events}" class="btn btn-secondary">My Events</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
