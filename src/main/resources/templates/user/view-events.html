<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Events - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>Available Events</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="search-container">
        <form th:action="@{/user/events/search}" method="get" class="search-form">
            <input type="text" name="keyword" th:value="${searchKeyword}" placeholder="Search events..." class="search-input">
            <select name="strategy" class="search-select">
                <option value="TITLE" th:selected="${searchStrategy == 'TITLE'}">By Title</option>
                <option value="LOCATION" th:selected="${searchStrategy == 'LOCATION'}">By Location</option>
                <option value="DATE" th:selected="${searchStrategy == 'DATE'}">By Date</option>
            </select>
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/user/events}" class="btn btn-secondary">Clear</a>
        </form>
    </div>

    <div class="events-grid">
        <div th:each="event : ${events}" class="event-card" th:classappend="${event.isPremium()} ? 'premium' : (${event.isFeatured()} ? 'featured' : '')">
            <div class="event-badge" th:if="${event.isPremium()}">⭐ Premium</div>
            <div class="event-badge" th:if="${event.isFeatured()}">🔥 Featured</div>

            <h3 th:text="${event.title}">Event Title</h3>
            <p class="event-description" th:text="${#strings.abbreviate(event.description, 100)}">Description</p>

            <div class="event-details">
                <p><strong>📍 Location:</strong> <span th:text="${event.location}"></span></p>
                <p><strong>📅 Date:</strong> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy HH:mm')}"></span></p>
                <p><strong>👥 Attendees:</strong> <span th:text="${#lists.size(event.attendees)}"></span></p>
                <p><strong>👤 Created by:</strong> <span th:text="${event.createdBy.fullName}"></span></p>
            </div>

            <div class="event-actions">
                <form th:if="!${#lists.contains(myEventIds, event.id)}" th:action="@{/user/events/register/{id}(id=${event.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <form th:if="${#lists.contains(myEventIds, event.id)}" th:action="@{/user/events/unregister/{id}(id=${event.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-warning">Unregister</button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(events)}" class="empty-state">
            <p>No events found.</p>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
