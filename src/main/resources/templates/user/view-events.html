<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Events - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>
    
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Available Events')}"></div>

        <div th:if="${successMessage}" class="alert alert-success animate-up" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger animate-up" th:text="${errorMessage}"></div>

        <div class="card animate-up" style="margin-bottom: 2rem; background: var(--surface-hover);">
            <form th:action="@{/user/events/search}" method="get" id="searchForm" style="display: flex; gap: 1rem; align-items: center;">
                <input type="text" name="keyword" id="searchKeyword" th:value="${searchKeyword}" placeholder="Search events..." class="input" style="flex: 1; background: white;">
                
                <select name="strategy" id="searchStrategy" class="input" style="width: 200px; background: white;">
                    <option value="TITLE" th:selected="${searchStrategy == 'TITLE'}">By Title</option>
                    <option value="LOCATION" th:selected="${searchStrategy == 'LOCATION'}">By Location</option>
                    <option value="DATE" th:selected="${searchStrategy == 'DATE'}">By Date</option>
                </select>
                
                <button type="submit" class="btn btn-primary">🔍 Search</button>
                <a th:href="@{/user/events}" class="btn btn-secondary">Clear</a>
            </form>
        </div>

        <script>
            const strategySelect = document.getElementById('searchStrategy');
            const keywordInput = document.getElementById('searchKeyword');

            function updateInputType() {
                if (strategySelect.value === 'DATE') {
                    keywordInput.type = 'date';
                    keywordInput.placeholder = '';
                } else {
                    keywordInput.type = 'text';
                    keywordInput.placeholder = 'Search events...';
                }
            }

            strategySelect.addEventListener('change', updateInputType);
            window.addEventListener('DOMContentLoaded', updateInputType);
        </script>

        <div th:if="${#lists.isEmpty(events)}" class="card animate-up" style="text-align: center; padding: 4rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
            <p style="color: var(--text-muted);">No events found matching your criteria.</p>
        </div>

        <div class="events-grid">
            <div th:each="event : ${events}" class="card event-card animate-up" style="position: relative; overflow: hidden;">
                <div th:if="${event.isPremium()}" style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--warning);"></div>
                <div th:if="${event.isFeatured() && !event.isPremium()}" style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--info);"></div>

                <div class="event-header" style="margin-top: 0.5rem;">
                    <h4 th:text="${event.title}" style="margin: 0; font-size: 1.2rem;"></h4>
                    <div style="display: flex; gap: 0.25rem; flex-direction: column; align-items: flex-end;">
                        <span th:if="${event.isPremium()}" class="badge badge-warning" style="font-size: 0.6rem;">⭐ Premium</span>
                        <span th:if="${event.isFeatured()}" class="badge badge-info" style="font-size: 0.6rem;">🔥 Featured</span>
                    </div>
                </div>

                <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" th:text="${event.description}"></p>

                <div style="margin: 1rem 0; color: var(--text-muted); font-size: 0.875rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span>📍</span> <span th:text="${event.location}"></span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span>🕒</span> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy HH:mm')}"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border);">
                        <span style="font-size: 0.8rem;">👥 <span th:text="${#lists.size(event.attendees)}"></span> attending</span>
                        <span style="font-size: 0.8rem;">👤 By: <span th:text="${event.createdBy.fullName}"></span></span>
                    </div>
                </div>

                <div style="margin-top: 1.5rem;">
                    <form th:if="!${#lists.contains(myEventIds, event.id)}" th:action="@{/user/events/register/{id}(id=${event.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Register Now</button>
                    </form>
                    <form th:if="${#lists.contains(myEventIds, event.id)}" th:action="@{/user/events/unregister/{id}(id=${event.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-secondary" style="width: 100%; color: var(--warning); border-color: var(--warning-soft);">Unregister</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
