<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - Faculty Event Management</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>My Registered Events</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="events-list">
        <div th:each="event : ${events}" class="event-card registered">
            <div class="event-header">
                <h3 th:text="${event.title}">Event Title</h3>
                <div class="badges">
                    <span th:if="${event.isPremium()}" class="badge badge-premium">Premium</span>
                    <span th:if="${event.isFeatured()}" class="badge badge-featured">Featured</span>
                </div>
            </div>

            <p th:text="${event.description}">Description</p>

            <div class="event-meta">
                <p><strong>📍</strong> <span th:text="${event.location}"></span></p>
                <p><strong>📅</strong> <span th:text="${#temporals.format(event.eventDate, 'EEEE, MMM dd, yyyy HH:mm')}"></span></p>
            </div>

            <form th:action="@{/user/events/unregister/{id}(id=${event.id})}" method="post" onsubmit="return confirm('Are you sure you want to unregister from this event?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-warning">Unregister from Event</button>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(events)}" class="empty-state">
            <h3>No Registered Events</h3>
            <p>You haven't registered for any events yet.</p>
            <a th:href="@{/user/events}" class="btn btn-primary">Browse Available Events</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
