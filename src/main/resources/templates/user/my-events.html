<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - EventHub</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/user.css}">
</head>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/nav :: nav}"></div>
    
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='My Registered Events')}"></div>

        <div th:if="${successMessage}" class="alert alert-success animate-up" th:text="${successMessage}"></div>

        <div th:if="${#lists.isEmpty(events)}" class="card animate-up" style="text-align: center; padding: 4rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎫</div>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">You haven't registered for any events yet.</p>
            <a th:href="@{/user/events}" class="btn btn-primary">Discover Events</a>
        </div>

        <div th:unless="${#lists.isEmpty(events)}" class="events-grid">
            <div th:each="event : ${events}" class="card event-card animate-up">
                <div class="event-header">
                    <h4 th:text="${event.title}" style="margin: 0; font-size: 1.2rem;"></h4>
                    <div style="display: flex; gap: 0.25rem;">
                        <span th:if="${event.isPremium()}" class="badge badge-warning" style="font-size: 0.6rem;">Premium</span>
                        <span th:if="${event.isFeatured()}" class="badge badge-info" style="font-size: 0.6rem;">Featured</span>
                    </div>
                </div>
                
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" th:text="${event.description}"></p>

                <div style="margin: 1rem 0; color: var(--text-muted); font-size: 0.875rem; background: var(--surface-hover); padding: 1rem; border-radius: var(--radius-md);">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <span>📍</span> <span th:text="${event.location}">Location</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <span>🕒</span> <span th:text="${#temporals.format(event.eventDate, 'EEEE, MMM dd, HH:mm')}">Date</span>
                    </div>
                </div>
                
                <form th:action="@{/user/events/unregister/{id}(id=${event.id})}" method="post" style="margin-top: 1.5rem;" onsubmit="return confirm('Are you sure you want to unregister from this event?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-secondary" style="width: 100%; color: var(--danger); border-color: var(--danger-soft);">
                        Unregister from Event
                    </button>
                </form>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
</div>
</body>
</html>
